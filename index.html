<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Department Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#1F3864 0%,#16213e 100%);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:width .25s;overflow:hidden}
.sidebar.collapsed{width:60px}
.sidebar-logo{padding:18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1);min-height:64px}
.logo-icon{width:32px;height:32px;background:#FF6B35;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden}
.logo-text span{display:block;font-size:10px;font-weight:400;opacity:.6}
.sidebar-toggle{background:none;border:none;color:#fff;cursor:pointer;padding:4px 8px;margin-left:auto;font-size:18px;flex-shrink:0}
.sidebar nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.45;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .nav-section{opacity:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .18s;white-space:nowrap;overflow:hidden;font-size:13.5px}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:rgba(255,107,53,.25);border-left-color:#FF6B35}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-label{white-space:nowrap;overflow:hidden}
.sidebar.collapsed .nav-label{opacity:0;width:0}
.nav-badge{margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.sidebar.collapsed .nav-badge{display:none}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;opacity:.5;white-space:nowrap;overflow:hidden}
.main{margin-left:240px;transition:margin-left .25s;flex:1;display:flex;flex-direction:column}
.main.shifted{margin-left:60px}
.topbar{background:#fff;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:50}
.topbar-title h1{font-size:18px;font-weight:700;color:#1F3864}
.topbar-title p{font-size:12px;color:#888}
.topbar-actions{display:flex;gap:10px;align-items:center}
.badge-date{font-size:12px;background:#f0f2f5;padding:4px 12px;border-radius:20px;color:#555}
.live-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;display:flex;align-items:center;gap:5px}
.live-badge.connected{background:#e8f5e9;color:#2e7d32}
.live-badge.offline{background:#fce4d6;color:#b71c1c}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.page{padding:24px 28px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:4px solid;position:relative;overflow:hidden}
.kpi-card::after{content:attr(data-icon);position:absolute;right:12px;top:12px;font-size:28px;opacity:.12}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;line-height:1}
.kpi-sub{font-size:12px;color:#888;margin-top:6px}
.kpi-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.kpi-chip{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-title{font-size:14px;font-weight:700;color:#1F3864;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chart-title .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-wrap{height:200px;position:relative}
.pipeline-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:24px}
.pipeline-title{font-size:14px;font-weight:700;color:#1F3864;margin-bottom:16px}
.pipeline-steps{display:flex;align-items:center}
.pipe-step{flex:1;text-align:center;padding:12px 8px;border-radius:8px;color:#fff;font-size:12px;font-weight:700}
.pipe-arrow{color:#aaa;font-size:20px;padding:0 6px;flex-shrink:0}
.pipe-count{font-size:22px;font-weight:800;display:block}
.module-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.module-title{display:flex;align-items:center;gap:10px}
.module-title h2{font-size:20px;font-weight:700}
.module-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700;color:#fff}
.module-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .18s}
.btn-primary{background:#1F3864;color:#fff}.btn-primary:hover{background:#2E75B6}
.btn-firebase{background:#FF6B35;color:#fff}.btn-firebase:hover{background:#e55a25}
.btn-success{background:#548235;color:#fff}.btn-success:hover{background:#375623}
.btn-outline{background:#fff;color:#1F3864;border:1.5px solid #1F3864}.btn-outline:hover{background:#f0f4ff}
.btn-danger{background:#C00000;color:#fff}.btn-danger:hover{background:#900000}
.btn-sm{padding:5px 12px;font-size:12px}.btn-icon{padding:6px 10px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.filters-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.filter-input{padding:6px 10px;border:1.5px solid #dde;border-radius:7px;font-size:13px;outline:none;min-width:140px}
.filter-input:focus{border-color:#FF6B35}
.filter-select{padding:6px 10px;border:1.5px solid #dde;border-radius:7px;font-size:13px;outline:none;background:#fff;min-width:130px;cursor:pointer}
.filter-clear{background:none;border:none;color:#FF6B35;cursor:pointer;font-size:12px;font-weight:600}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.table-info{padding:12px 18px;font-size:12px;color:#888;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#1F3864;color:#fff;padding:12px 14px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap}
tbody tr{border-bottom:1px solid #f5f5f5;transition:background .12s}
tbody tr:hover{background:#f8faff}
tbody tr:nth-child(even){background:#fafafa}
td{padding:10px 14px;vertical-align:middle}
.id-chip{font-size:11px;font-weight:700;background:#fff3ee;color:#FF6B35;padding:2px 8px;border-radius:6px;font-family:monospace}
.table-empty{text-align:center;padding:48px;color:#aaa;font-size:14px}
.empty-icon{font-size:40px;display:block;margin-bottom:8px}
.action-btns{display:flex;gap:6px}
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.status-Pending{background:#FFF2CC;color:#7d5700}.status-Approved{background:#E2EFDA;color:#375623}
.status-Rejected{background:#FFDADA;color:#7b0000}.status-Returned{background:#FCE4D6;color:#7a3b00}
.status-Inwarded{background:#E2EFDA;color:#375623}.status-Partial{background:#FCE4D6;color:#7a3b00}
.status-On-Hold{background:#BDD7EE;color:#1c4a6e}.status-Acknowledged{background:#E2EFDA;color:#375623}
.status-Credit-Issued{background:#E2EFDA;color:#375623}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:17px;font-weight:700;color:#1F3864}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:#555}
.form-label.required::after{content:' *';color:#C00000}
.form-input,.form-select{padding:9px 12px;border:1.5px solid #dde;border-radius:8px;font-size:13px;outline:none;transition:border .15s;background:#fff;width:100%}
.form-input:focus,.form-select:focus{border-color:#FF6B35;box-shadow:0 0 0 3px rgba(255,107,53,.1)}
.form-input.error{border-color:#C00000}
.form-error{font-size:11px;color:#C00000}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#fff;border-radius:12px;padding:28px;max-width:380px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.2);text-align:center}
.confirm-icon{font-size:44px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-msg{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.toast{position:fixed;bottom:28px;right:28px;background:#1F3864;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;animation:slideUp .25s ease}
.toast.success{background:#548235}.toast.error{background:#C00000}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.summary-strip{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.summary-chip{background:#fff;border-radius:8px;padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);font-size:12px}
.summary-chip strong{font-size:18px;display:block;font-weight:800}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm.dark{border:2px solid #eee;border-top-color:#FF6B35}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}.form-grid{grid-column:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const MODULES = {
  'approved-acc':{title:'Approved Accessories',shortTitle:'Acc. Approved',prefix:'ACC',icon:'\uD83D\uDD27',color:'#1F3864',statusOptions:['Pending','Approved','Rejected','Returned'],
    fields:[{key:'partName',label:'Part Name',type:'text',required:true},{key:'partCode',label:'Part Code / SKU',type:'text'},{key:'vendorName',label:'Vendor Name',type:'text'},{key:'invoiceNo',label:'Invoice No.',type:'text'},{key:'vendorContact',label:'Vendor Contact',type:'text'},{key:'qtyApproved',label:'Qty Approved',type:'number'},{key:'unitPrice',label:'Unit Price (\u20B9)',type:'number'},{key:'approvalDate',label:'Approval Date',type:'date'},{key:'approvedBy',label:'Approved By',type:'text'},{key:'status',label:'Status',type:'select',options:['Pending','Approved','Rejected','Returned']}],
    tableColumns:['id','partName','partCode','vendorName','invoiceNo','qtyApproved','unitPrice','totalValue','approvalDate','approvedBy','status'],
    tableLabels:['ID','Part Name','Part Code','Vendor','Invoice','Qty','Unit Price','Total Value','Date','Approved By','Status']},
  'inward-acc':{title:'Inward Accessories',shortTitle:'Acc. Inward',prefix:'INWA',icon:'\uD83D\uDCE6',color:'#2E75B6',statusOptions:['Pending','Inwarded','Partial','On Hold','Returned'],
    fields:[{key:'accRefNo',label:'Acc. Ref. No.',type:'text',required:true},{key:'partName',label:'Part Name',type:'text',required:true},{key:'partCode',label:'Part Code / SKU',type:'text'},{key:'vendorName',label:'Vendor Name',type:'text'},{key:'invoiceNo',label:'Invoice No.',type:'text'},{key:'qtyInwarded',label:'Qty Inwarded',type:'number'},{key:'unitPrice',label:'Unit Price (\u20B9)',type:'number'},{key:'inwardDate',label:'Inward Date',type:'date'},{key:'receivedBy',label:'Received By',type:'text'},{key:'status',label:'Status',type:'select',options:['Pending','Inwarded','Partial','On Hold','Returned']}],
    tableColumns:['id','accRefNo','partName','vendorName','invoiceNo','qtyInwarded','unitPrice','totalValue','inwardDate','receivedBy','status'],
    tableLabels:['ID','Acc. Ref.','Part Name','Vendor','Invoice','Qty','Unit Price','Total Value','Inward Date','Received By','Status']},
  'approved-ce':{title:'Approved CE',shortTitle:'CE Approved',prefix:'CE',icon:'\uD83D\uDCFA',color:'#375623',statusOptions:['Pending','Approved','Rejected','Returned'],
    fields:[{key:'deviceName',label:'CE / Device Name',type:'text',required:true},{key:'modelSerial',label:'Model / Serial No.',type:'text'},{key:'vendorName',label:'Vendor Name',type:'text'},{key:'invoiceNo',label:'Invoice No.',type:'text'},{key:'vendorContact',label:'Vendor Contact',type:'text'},{key:'qtyApproved'',label:'Qty Approved',type:'number'},{key:'unitPrice',label:'Unit Price (\u20B9)',type:'number'},{key:'approvalDate',label:'Approval Date',type:'date'},{key:'approvedBy',label:'Approved By',type:'text'},{key:'status',label:'Status',type:'select',options:['Pending','Approved','Rejected','Returned']}],
    tableColumns:['id','deviceName','modelSerial','vendorName','invoiceNo','qtyApproved','unitPrice','totalValue','approvalDate','approvedBy','status'],
    tableLabels:['ID','Device Name','Model/Serial','Vendor','Invoice','Qty','Unit Price','Total Value','Date','Approved By','Status']},
  'inward-ce':{title:'Inward CE',shortTitle:'CE Inward',prefix:'INWCE',icon:'\uD83D\uDCE5',color:'#00695C',statusOptions:['Pending','Inwarded','Partial','On Hold','Returned'],
    fields:[{key:'ceRefNo',label:'CE Ref. No.',type:'text',required:true},{key:'deviceName',label:'CE / Device Name',type:'text',required:true},{key:'modelSerial',label:'Model / Serial No.',type:'text'},{key:'vendorName',label:'Vendor Name',type:'text'},{key:'invoiceNo',label:'Invoice No.',type:'text'},{key:+qtyInwarded',label:'Qty Inwarded',type:'number'},{key:'unitPrice',label:'Unit Price (\u20B9)',type:'number'},{key:'inwardDate',label:'Inward Date',type:'date'},{key:'receivedBy',label:'Received By',type:'text'},{key:'status',label:'Status',type:'select',options:['Pending','Inwarded','Partial','On Hold','Returned']}],
    tableColumns:['id','ceRefNo','deviceName','vendorName','invoiceNo','qtyInwarded','unitPrice','totalValue','inwardDate','receivedBy','status'],
    tableLabels:['ID','CE Ref.','Device Name','Vendor','Invoice','Qty','Unit Price','Total Value','Inward Date','Received By','Status']},
  'return-vendor':{title:'Return to Vendor',shortTitle:'Return',prefix:'RTV',icon:'\u21A9\uFE0F',color:'#C65911',statusOptions:['Pending','Returned','Acknowledged','Credit Issued','Rejected'],
    fields:[{key:'type',label:'Type',type:'select',required:true,options:['Accessory','Consumer Electronics']},{key:'originalRef',label:'Original Ref. No.',type:'text',required:true},{key:'itemName',label:'Item Name',type:'text',required:true},{key:'partCodeModel',label:'Part Code / Model',type:'text'},{key:'vendorName',label:'Vendor Name',type:'text'},{key:'invoiceNo',label:'Invoice No.',type:'text'},{key:'qtyReturned',label:'Qty Returned',type:'number'},{key:'unitPrice',label:'Unit Price (\u20B9)',type:'number'},{key:'returnDate',label:'Return Date',type:'date'},{key:'returnReason',label:'Return Reason',type:'select',options:['Defective','Wrong Item','Excess Qty','Damaged in Transit','Quality Issue','Other']},{key:'status',label:'Status',type:'select',options:['Pending','Returned','Acknowledged','Credit Issued','Rejected']}],
    tableColumns:['id','type','originalRef','itemName','vendorName','invoiceNo','qtyReturned','unitPrice','totalValue','returnDate','returnReason','status'],
    tableLabels:['ID','Type','Ref. No.','Item Name','Vendor','Invoice','Qty','Unit Price','Total Value','Return Date','Reason','Status']},
};

const MODULE_KEYS=['approved-acc','inward-acc','approved-ce','inward-ce','return-vendor'];
const QTY_KEY={'approved-acc':'qtyApproved','inward-acc':'qtyInwarded','approved-ce':'qtyApproved','inward-ce':'qtyInwarded','return-vendor':'qtyReturned'};
const FB_KEY='svc_fb_cfg_v1';
const DEFAULT_CFG={apiKey:"AIzaSyD3ADIFSYuvq4gcADggsUKqeEPZgjJhxW0",authDomain:"service-deptmis.firebaseapp.com",projectId:"service-deptmis",storageBucket:"service-deptmis.firebasestorage.app",messagingSenderId:"386218614956",appId:"1:386218614956:web:98988173826fb81bf1bf09",measurementId:"G-6K48SKL5PD"};

let fbApp=null, db=null;
function initFirebase(cfg){
  try{ if(fbApp) fbApp.delete(); }catch(_){}
  fbApp=firebase.initializeApp(cfg,'svc-'+Date.now());
  db=fbApp.firestore();
  localStorage.setItem(FB_KEY,JSON.stringify(cfg));
}
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(FB_KEY)); }catch(_){ return null; } }
function parseCfg(txt){
  const m=txt.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('No config object found');
  const raw=m[0];
  try{ return JSON.parse(raw); }catch(_){}
  let j=raw.replace(/\/\/[^\n]*/g,'').replace(/('|")([^'"]+)\1\s*:/g,'"$2":').replace(/(\b[a-zA-Z_]\w*)\s*:/g,'"$1":').replace(/'/g,'"').replace(/,\s*([}\]])/g,'$1');
  return JSON.parse(j);
}

const genId=(prefix,recs)=>{ const max=recs.reduce((m,r)=>{ const n=parseInt((r.id||'').split('-').pop()||'0'); return n>m?n:m; },0); return `${prefix}-${String(max+1).padStart(3,'0')}`; };
const fmt$=(v)=>(v!=null&&v!=='')?`\u20B9${Number(v).toLocaleString('en-IN',{minimumFractionDigits:2})}`:'--';
const fmtN=(v)=>(v!=null&&v!=='')?Number(v).toLocaleString('en-IN'):'--';
const tv=(rec,mk)=>(parseFloat(rec[QTY_KEY[mk]])||0)*(parseFloat(rec.unitPrice)||0);
const cell=(col,rec,mk)=>{ if(col==='totalValue') return fmt$(tv(rec,mk)); if(col==='unitPrice') return fmt$(rec[col]); if(['qtyApproved','qtyInwarded','qtyReturned'].includes(col)) return fmtN(rec[col]); return rec[col]||'--'; };

const Badge=({s})=><span className={`status-badge status-${(s||'').replace(/\s+/g,'-')}`}>{s||'--'}</span>;
const Toast=({msg,type,onDone})=>{ useEffect(()=>{ const t=setTimeout(onDone,3000); return()=>clearTimeout(t); },[]); return <div className={`toast ${type}`}>{ {success:'OK',error:'ERR',info:'i'}[type]||'*' } {msg}</div>; };
const SpinSm=()=><div className="spinner-sm dark" style={{display:'inline-block'}}></div>;

const Modal=({title,onClose,children,footer})=>(
  <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-header"><h3>{title}</h3><button className="modal-close" onClick={onClose}>&times;</button></div>
      <div className="modal-body">{children}</div>
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>
);

const RecordForm=({mk,rec,onSave,onClose,saving})=>{
  const mod=MODULES[mk];
  const [form,setForm]=useState(()=>{ const i={}; mod.fields.forEach(f=>{i[f.key]=rec?(rec[f.key]||''):''}); return i; });
  const [errs,setErrs]=useState({});
  const validate=()=>{ const e={}; mod.fields.filter(f=>f.required).forEach(f=>{ if(!form[f.key]||!String(form[f.key]).trim()) e[f.key]='Required'; }); setErrs(e); return !Object.keys(e).length; };
  const total=tv(form,mk);
  return(
    <Modal title={rec?`Edit -- ${rec.id}`:`Add New ${mod.title}`} onClose={onClose}
      footer={<><button className="btn btn-outline" onClick={onClose} disabled={saving}>Cancel</button>
        <button className="btn btn-firebase" onClick={()=>validate()&&onSave(form)} disabled={saving}>
          {saving?<><SpinSm/> Saving...</>:rec?'Save Changes':'Add Record'}
        </button></>}>
      <div className="form-grid">
        {mod.fields.map(f=>(
          <div key={f.key} className={`form-group${['vendorContact','returnReason'].includes(f.key)?' full':''}`}>
            <label className={`form-label${f.required?' required':''}`}>{f.label}</label>
            {f.type==='select'
              ?<select className="form-select" value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}>
                <option value="">-- Select --</option>{f.options.map(o=><option key={o}>{o}</option>)}</select>
              :<input className={`form-input${errs[f.key]?' error':''}`} type={f.type} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}/>}
            {errs[f.key]&&<span className="form-error">{errs[f.key]}</span>}
          </div>
        ))}
        {total>0&&<div className="form-group full"><label className="form-label">Total Value</label>
          <div style={{padding:'9px 12px',background:'#fff3ee',borderRadius:8,fontWeight:700,color:'#FF6B35'}}>{fmt$(total)}</div></div>}
      </div>
    </Modal>
  );
};

const ModulePage=({mk,records,onAdd,onEdit,onDelete,showToast})=>{
  const mod=MODULES[mk];
  const [search,setSrch]=useState('');
  const [stF,setStF]=useState('');
  const [form,setForm]=useState(false);
  const [editR,setEditR]=useState(null);
  const [delId,setDelId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [deling,setDeling]=useState(false);

  const filtered=records.filter(r=>{ const q=search.toLowerCase(); return(!q||Object.values(r).some(v=>String(v).toLowerCase().includes(q)))&&(!stF||r.status===stF); });
  const save=async(f)=>{ setSaving(true); try{ if(editR){await onEdit(mk,{...editR,...f});showToast('Updated','success');}else{await onAdd(mk,f);showToast('Added','success');} setForm(false);setEditR(null);}catch(e){showToast('Error: '+e.message,'error');} setSaving(false); };
  const doDel=async()=>{ setDeling(true); try{await onDelete(mk,delId);showToast('Deleted','info');}catch(e){showToast('Delete failed','error');} setDeling(false);setDelId(null); };

  const exportXL=()=>{
    const rows=filtered.map(r=>{ const row={}; mod.tableColumns.forEach((c,i)=>{ row[mod.tableLabels[i]]=c==='totalValue'?tv(r,mk):(r[c]||''); }); return row; });
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb2=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb2,ws,mod.title.slice(0,31));
    XLSX.writeFile(wb2,mod.title.replace(/\s+/g,'_')+'.xlsx');
    showToast('Exported','success');
  };

  const counts={}; mod.statusOptions.forEach(s=>{counts[s]=records.filter(r=>r.status===s).length;});
  const totalQty=records.reduce((s,r)=>s+(parseFloat(r[QTY_KEY[mk]])||0),0);
  const totalVal2=records.reduce((s,r)=>s+tv(r,mk),0);

  return(
    <div>
      {form&&<RecordForm mk={mk} rec={editR} onSave={save} onClose={()=>{setForm(false);setEditR(null);}} saving={saving}/>}
      {delId&&<div className="confirm-overlay"><div className="confirm-box">
        <div className="confirm-icon">\uD83D\uDDD1</div>
        <div className="confirm-title">Delete Record?</div>
        <div className="confirm-msg">Permanently remove <strong>{delId}</strong> from Firebase. This cannot be undone.</div>
        <div className="confirm-btns">
          <button className="btn btn-outline" onClick={()=>setDelId(null)} disabled={deling}>Cancel</button>
          <button className="btn btn-danger" onClick={doDel} disabled={deling}>{deling?<><SpinSm/> Deleting...</>:'Delete'}</button>
        </div>
      </div></div>}

      <div className="module-header">
        <div className="module-title">
          <span style={{fontSize:24}}>{mod.icon}</span><h2>{mod.title}</h2>
          <span className="module-badge" style={{background:mod.color}}>{records.length} records</span>
        </div>
        <div className="module-actions">
          <button className="btn btn-success" onClick={exportXL}>&#8659; Export Excel</button>
          <button className="btn btn-firebase" onClick={()=>{setEditR(null);setForm(true);}}>+ Add Record</button>
        </div>
      </div>

      <div className="filters-bar">
        <input className="filter-input" placeholder="Search all fields..." value={search} onChange={e=>setSrch(e.target.value)}/>
        <select className="filter-select" value={stF} onChange={e=>setStF(e.target.value)}>
          <option value="">All Status</option>{mod.statusOptions.map(s=><option key={s}>{s}</option>)}
        </select>
        {(search||stF)&&<button className="filter-clear" onClick={()=>{setSrch('');setStF('');}}>&#10005; Clear</button>}
        <span style={{marginLeft:'auto',fontSize:12,color:'#888'}}>{filtered.length} of {records.length}</span>
      </div>

      <div className="table-wrap">
        <div className="table-info">
          <span><strong>{filtered.length}</strong> records shown</span>
          <span style={{color:'#FF6B35',fontWeight:700}}>Total: {fmt$(totalVal2)}</span>
        </div>
        <div className="table-scroll">
          <table>
            <thead><tr>{mod.tableLabels.map((l,i)=><th key={i}>{l}</th>)}<th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0
                ?<tr><td colSpan={mod.tableLabels.length+1} className="table-empty"><span className="empty-icon">\uD83D\uDCCB</span>No records -- click <b>Add Record</b> to start</td></tr>
                :filtered.map(r=>(
                  <tr key={r.id}>
                    {mod.tableColumns.map(c=><td key={c}>{c==='id'?<span className="id-chip">{r.id}</span>:c==='status'?<Badge s={r.status}/>:cell(c,r,mk)}</td>)}
                    <td><div className="action-btns">
                      <button className="btn btn-outline btn-sm btn-icon" title="Edit" onClick={()=>{setEditR(r);setForm(true);}}>&#9998;</button>
                      <button className="btn btn-danger btn-sm btn-icon" title="Delete" onClick={()=>setDelId(r.id)}>\uD83D\uDDD1</button>
                    </div></td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
      </div>

      <div className="summary-strip">
        <div className="summary-chip"><strong>{fmtN(totalQty)}</strong>Total Qty</div>
        <div className="summary-chip"><strong style={{fontSize:13}}>{fmt$(totalVal2)}</strong>Total Value</div>
        {mod.statusOptions.map(s=><div key={s} className="summary-chip"><strong style={{color:mod.color}}>{counts[s]||0}</strong>{s}</div>)}
      </div>
    </div>
  );
};

const BarChart=({mk,records,color})=>{
  const ref=useRef(null),chart=useRef(null);
  const mod=MODULES[mk];
  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current) chart.current.destroy();
    chart.current=new Chart(ref.current,{type:'bar',
      data:{labels:mod.statusOptions,datasets:[{data:mod.statusOptions.map(s=>records.filter(r=>r.status===s).length),backgroundColor:color+'cc',borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'#f0f0f0'}}}}});
    return()=>{if(chart.current)chart.current.destroy();};
  },[records]);
  return <canvas ref={ref}/>;
};

const Dashboard=({data})=>{
  const C={'approved-acc':'#1F3864','inward-acc':'#2E75B6','approved-ce':'#375623','inward-ce':'#00695C','return-vendor':'#C65911'};
  const today=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const stats=MODULE_KEYS.map(k=>{ const r=data[k]||[]; return{key:k,mod:MODULES[k],r,pending:r.filter(x=>x.status==='Pending').length,done:r.filter(x=>['Approved','Inwarded','Credit Issued','Returned','Acknowledged'].includes(x.status)).length,v:r.reduce((s,x)=>s+tv(x,k),0)}; });
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div><h2 style={{fontSize:22,fontWeight:800,color:'#1F3864'}}>Management Dashboard</h2><p style={{color:'#888',fontSize:13}}>\uD83D\uDD25 Real-time sync via Firebase</p></div>
        <span className="badge-date">\uD83D\uDCC5 {today}</span>
      </div>
      <div className="kpi-grid">
        {stats.map(({key,mod,r,pending,done,v})=>(
          <div key={key} className="kpi-card" data-icon={mod.icon} style={{borderTopColor:C[key]}}>
            <div className="kpi-label">{mod.shortTitle}</div>
            <div className="kpi-value" style={{color:C[key]}}>{r.length}</div>
            <div className="kpi-sub">records</div>
            <div className="kpi-row">
              <span className="kpi-chip status-Pending">{pending} pending</span>
              <span className="kpi-chip status-Approved">{done} done</span>
            </div>
            {v>0&&<div style={{marginTop:6,fontSize:11,fontWeight:700,color:C[key]}}>\u20B9{Math.round(v).toLocaleString('en-IN')}</div>}
          </div>
        ))}
      </div>
      <div className="pipeline-card">
        <div className="pipeline-title">&#9889; Workflow Pipeline</div>
        <div className="pipeline-steps">
          {stats.map(({key,mod,r},i)=>(
            <React.Fragment key={key}>
              <div className="pipe-step" style={{background:C[key]}}><span className="pipe-count">{r.length}</span>{mod.shortTitle}</div>
              {i<stats.length-1&&<div className="pipe-arrow">&rarr;</div>}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div className="charts-grid">
        {stats.map(({key,r})=>(
          <div key={key} className="chart-card">
            <div className="chart-title"><span className="dot" style={{background:C[key]}}></span>{MODULES[key].title}</div>
            <div className="chart-wrap"><BarChart mk={key} records={r} color={C[key]}/></div>
          </div>
        ))}
      </div>
    </div>
  );
};

const App=()=>{
  const [ready,setReady]=useState(false);
  const [data,setData]=useState({});
  const [page,setPage]=useState('dashboard');
  const [collapsed,setCollapsed]=useState(false);
  const [toast,setToast]=useState(null);
  const [live,setLive]=useState(false);
  const unsubs=useRef({});

  const showToast=(msg,type='success')=>setToast({msg,type,id:Date.now()});

  const subscribe=useCallback((mk)=>{
    if(!db) return;
    if(unsubs.current[mk]) unsubs.current[mk]();
    unsubs.current[mk]=db.collection(mk).onSnapshot(
      snap=>{ setData(d=>({...d,[mk]:snap.docs.map(doc=>doc.data())})); setLive(true); },
      ()=>setLive(false)
    );
  },[]);

  const launch=()=>{ MODULE_KEYS.forEach(mk=>subscribe(mk)); setTimeout(()=>setReady(true),1000); };

  useEffect(()=>{
    const cfg=loadCfg()||DEFAULT_CFG;
    try{ initFirebase(cfg); launch(); }catch(_){ localStorage.removeItem(FB_KEY); }
  },[]);

  useEffect(()=>()=>{ Object.values(unsubs.current).forEach(u=>u&&u()); },[]);

  const handleAdd=async(mk,form)=>{ const id=genId(MODULES[mk].prefix,data[mk]||[]); await db.collection(mk).doc(id).set({...form,id,createdAt:new Date().toISOString()}); };
  const handleEdit=async(mk,u)=>{ await db.collection(mk).doc(u.id).set({...u,updatedAt:new Date().toISOString()}); };
  const handleDelete=async(mk,id)=>{ await db.collection(mk).doc(id).delete(); };

  if(!ready) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#f0f2f5'}}>
      <div style={{fontSize:48}}>\uD83D\uDD25</div>
      <div className="spinner"></div>
      <p style={{color:'#666'}}>Connecting to Firebase...</p>
    </div>
  );

  const nav=[
    {key:'dashboard',label:'Dashboard',icon:'\uD83D\uDCCA',sec:'Overview'},
    {key:'approved-acc',label:'Approved Accessories',icon:'\uD83D\uDD27',sec:'Accessories',badge:(data['approved-acc']||[]).length},
    {key:'inward-acc',label:'Inward Accessories',icon:'\uD83D\uDCE6',badge:(data['inward-acc']||[]).length},
    {key:'approved-ce',label:'Approved CE',icon:'\uD83D\uDCFA',sec:'Consumer Electronics',badge:(data['approved-ce']||[]).length},
    {key:'inward-ce',label:'Inward CE',icon:'\uD83D\uDCE5',badge:(data['inward-ce']||[]).length},
    {key:'return-vendor',label:'Return to Vendor',icon:'\u21A9\uFE0F',sec:'Returns',badge:(data['return-vendor']||[]).length},
  ];
  const PT=page==='dashboard'?{t:'Dashboard',s:'Real-time overview via Firebase'}:{t:MODULES[page]?.title||'',s:'Changes sync instantly to all users'};

  return(
    <div className="layout">
      <div className={`sidebar${collapsed?' collapsed':''}`}>
        <div className="sidebar-logo">
          <div className="logo-icon">\uD83D\uDD25</div>
          {!collapsed&&<div className="logo-text">Service Dept.<span>Firebase Edition</span></div>}
          <button className="sidebar-toggle" onClick={()=>setCollapsed(c=>!c)}>{collapsed?'&#9654;':'&#9664;'}</button>
        </div>
        <nav>
          {nav.map((item,i)=>{
            const prev=nav[i-1];
            const showS=item.sec&&(!prev||prev.sec!==item.sec);
            return(
              <React.Fragment key={item.key}>
                {showS&&!collapsed&&<div className="nav-section">{item.sec}</div>}
                <div className={`nav-item${page===item.key?' active':''}`} onClick={()=>setPage(item.key)}>
                  <span className="nav-icon">{item.icon}</span>
                  <span className="nav-label">{item.label}</span>
                  {item.badge>0&&<span className="nav-badge">{item.badge}</span>}
                </div>
              </React.Fragment>
            );
          })}
        </nav>
        {!collapsed&&<div className="sidebar-footer">\uD83D\uDD25 Powered by Firebase</div>}
      </div>

      <div className={`main${collapsed?' shifted':''}`}>
        <div className="topbar">
          <div className="topbar-title"><h1>{PT.t}</h1><p>{PT.s}</p></div>
          <div className="topbar-actions">
            <span className={`live-badge ${live?'connected':'offline'}`}>
              <span className="live-dot"></span>
              {live?'Live -- Firebase Connected':'Reconnecting...'}
            </span>
            <span className="badge-date">{new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span>
          </div>
        </div>
        <div className="page">
          {page==='dashboard'
            ?<Dashboard data={data}/>
            :<ModulePage mk={page} records={data[page]||[]} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDelete} showToast={showToast}/>
          }
        </div>
      </div>
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
